version: "3.8"

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: brian-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: brian_test
    ports:
      - "5433:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d brian_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - brian-test-network

volumes:
  test-db-data:
    driver: local

networks:
  brian-test-network:
    driver: bridge
